<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover"
    />

    <title>ePIS Chat Assistant</title>

    <!-- ✅ ADD: Markdown parser library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="chat-widget">
      <!-- HEADER -->

      <div class="chat-header">
        <img src="logo.png" class="header-logo" />

        <div class="header-text">
          <div class="title">ePIS Assistant</div>
        </div>

        <button class="close-btn" onclick="closeChat()">✕</button>
      </div>

      <!-- MESSAGES -->

      <div id="chat-messages"></div>

      <!-- INPUT -->

      <div class="input-area">
        <input
          id="user-input"
          placeholder="Ask an EPIS question from the FAQ... "
          autocomplete="off"
        />

        <button class="send-btn" id="sendBtn">
          <svg viewBox="0 0 24 24">
            <path d="M2 21l21-9L2 3v7l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
